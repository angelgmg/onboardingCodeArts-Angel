<!--/src/app/modules/tasks-page-component/tasks-page-component.html-->
<main class="min-h-screen bg-white">
  <div class="mx-auto max-w-7xl px-4 py-10 sm:px-8 sm:py-12 lg:px-16 lg:py-16">
    <app-back-to-landing-button></app-back-to-landing-button>
    
    <app-page-title
      title="Mis tareas"
      subtitle="Consulta el estado de cada tarea y mantén el trabajo organizado."
    ></app-page-title>

    <div class="mt-8">
      <app-task-form-component
        (submitted)="onTaskSubmitted($event)"
      ></app-task-form-component>
    </div>

    <section
      class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 lg:gap-6"
    >
      <article
        *ngFor="let task of tasks"
        class="rounded-xl border border-gray-200 p-4 shadow-sm sm:p-5"
      >
        <h3 class="text-lg font-semibold text-gray-900">{{ task.title }}</h3>

        <p class="mt-3 text-sm text-gray-700">
          Estado:
          <span
            [class]="
              task.status === 'completada'
                ? 'text-green-600'
                : task.status === 'en progreso'
                ? 'text-blue-600'
                : 'text-yellow-600'
            "
            class="font-medium"
          >
            {{ task.status }}
          </span>
        </p>

        <p *ngIf="task.dueDate" class="mt-2 text-sm text-gray-600">
          Fecha límite: {{ task.dueDate }}
        </p>
      </article>
    </section>
  </div>
</main>
