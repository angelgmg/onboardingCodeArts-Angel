<!-- src/app/modules/tasks-page-component/tasks-page-component.html -->
<main
  class="mx-auto min-h-screen max-w-7xl bg-white px-4 py-24 sm:px-8 sm:py-32 lg:px-16"
>
  <div
    class="flex flex-col items-start gap-6 lg:flex-row lg:items-center lg:justify-between"
  >
    <app-page-title
      class="w-full"
      title="Gestión de Tareas"
      subtitle="Organiza y administra tus pendientes con un vistazo rápido."
    ></app-page-title>
  </div>
  <div>
    <app-back-to-landing-button
      class="mt-4 flex justify-start"
    ></app-back-to-landing-button>
  </div>

  <div class="mt-8">
    <app-task-form-component
      (submitted)="onTaskSubmitted($event)"
    ></app-task-form-component>
  </div>

  <app-task-filters (apply)="onFiltersApply($event)"></app-task-filters>

  <div class="mt-8">
    <app-task-list></app-task-list>
  </div>
</main>
