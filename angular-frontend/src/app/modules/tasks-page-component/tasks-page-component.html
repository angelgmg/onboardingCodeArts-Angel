<main class="min-h-screen bg-white">
  <div class="mx-auto max-w-7xl px-4 py-10 sm:px-8 sm:py-12 lg:px-16 lg:py-16">
    <app-back-to-landing-button
      class="mb-6 block lg:hidden"
    ></app-back-to-landing-button>

    <app-page-title
      title="Mis tareas"
      subtitle="Consulta el estado de cada tarea y mantén el trabajo organizado."
    ></app-page-title>

    <div class="mt-8">
      <button
        type="button"
        class="inline-flex min-h-11 w-full items-center justify-center rounded-md bg-blue-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 sm:w-auto"
      >
        Crear tarea
      </button>
    </div>

    <section
      class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:gap-6 lg:grid-cols-3"
    >
      <article
        *ngFor="let task of tasks"
        class="rounded-xl border border-gray-200 p-4 shadow-sm sm:p-5"
      >
        <h3 class="text-lg font-semibold text-gray-900">{{ task.title }}</h3>

        <p class="mt-3 text-sm text-gray-700">
          Estado:
          <span
            [class]="
              task.status === 'completada' ? 'text-green-600' :
              task.status === 'en progreso' ? 'text-blue-600' :
              'text-yellow-600'
            "
            class="font-medium"
          >
            {{ task.status }}
          </span>
        </p>

        @if (task.dueDate) {
        <p class="mt-2 text-sm text-gray-600">
          Fecha límite: {{ task.dueDate }}
        </p>
        }
      </article>
    </section>
  </div>
</main>
